<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/superdub-icon-192.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/superdub-icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0E14" />
    <meta name="description" content="Superdub — eat well. live better. level up." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,600;0,700;0,800;1,700;1,800&family=Sora:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Superdub" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Superdub</title>
  </head>
  <body style="margin:0;background:#0E0E14;">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="sd-boot" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0E0E14;">
        <div style="width:56px;height:56px;border-radius:50%;border:4px solid rgba(255,255,255,0.08);border-top-color:#2FD27E;border-right-color:#2E8BFF;animation:sdboot 0.8s linear infinite;"></div>
      </div>
      <style>@keyframes sdboot{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
